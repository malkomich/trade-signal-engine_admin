name: Deploy Admin

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VITE_FIREBASE_VAPID_KEY: ${{ secrets.VITE_FIREBASE_VAPID_KEY }}
      VITE_API_BASE_URL: https://trade-signal-engine.backend.synapsesea.com/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TRADE_SIGNAL_ENGINE }}

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Firebase Hosting and Realtime Database rules
        env:
          GOOGLE_CLOUD_PROJECT: trade-signal-engine
          FIREBASE_PROJECT_ID: trade-signal-engine
        run: npx firebase-tools deploy --only database,hosting:admin --project trade-signal-engine --non-interactive
